<h1>Referencia: Gráficos</h1>

<!-- ==================== CANVAS ==================== -->
<h2>&lt;canvas&gt;</h2>

<div class="demo">
    <h3>Ejemplo de &lt;canvas&gt; (dibujado con JavaScript)</h3>
    <canvas id="miCanvas" width="400" height="200" style="background-color: #e44c2654; border:1px solid #E44D26;"></canvas>
    <p class="nota">Se dibujó una casa con techo usando JavaScript en el canvas.</p>
</div>

<!-- ==================== SVG ==================== -->
<h2>&lt;svg&gt;</h2>
<div class="demo">
    <h3>Ejemplo de &lt;svg&gt; (gráfico vectorial)</h3>
    <svg width="300" height="150" xmlns="http://www.w3.org/2000/svg" style="border:1px solid #E44D26; background-color: #e44c2654;">
        
        <!-- Sol -->
        <circle cx="50" cy="40" r="20" fill="#E44D26" />

        <!-- Montaña -->
        <polygon points="120,120 170,50 220,120" fill="#E44D26" fill-opacity="0.6"/>

        <!-- Suelo -->
        <rect x="0" y="120" width="300" height="30" fill="#E44D26" fill-opacity="0.3"/>

        <!-- Texto -->
        <text x="20" y="145" fill="white" font-size="12">Paisaje SVG</text>
        <text x="180" y="145" fill="white" font-size="12">escalable</text>
    </svg>
    <p class="nota">El SVG sigue siendo vectorial, por eso no pierde calidad.</p>
</div>

<script>
    const canvas = document.getElementById('miCanvas');
    const ctx = canvas.getContext('2d');

    // Casa (base)
    ctx.fillStyle = 'white';
    ctx.fillRect(120, 80, 100, 70);

    // Techo (triángulo)
    ctx.beginPath();
    ctx.moveTo(120, 80);
    ctx.lineTo(170, 40);
    ctx.lineTo(220, 80);
    ctx.closePath();
    ctx.fillStyle = '#E44D26';
    ctx.fill();

    // Puerta
    ctx.fillStyle = 'black';
    ctx.fillRect(155, 110, 20, 40);

    // Texto
    ctx.fillStyle = 'black';
    ctx.font = '14px Arial';
    ctx.fillText('Casa', 150, 170);
</script>
