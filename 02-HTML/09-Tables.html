<main>
        <header>
            <h1>09-tables</h1>
            <h2>Creates tables for data display.</h2>

    >
    <title>Tabla Películas</title>

<body>

<style>
    body{
        background: linear-gradient(135deg, #1e1e1e, #000000);
        color: white;
        font-family: 'Segoe UI', sans-serif;
    }

    table{
        width: 65%;
        margin: 80px auto;
        border-collapse: collapse;
        text-align: center;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 25px rgba(255, 115, 0, 0.3);
    }

    th{
        background: linear-gradient(90deg, #ff6a00, #ff914d);
        padding: 14px;
        font-size: 16px;
        letter-spacing: 1px;
    }

    td{
        padding: 12px;
        transition: 0.3s;
    }

    tr{
        background-color: #2a2a2a;
    }

    tr:nth-child(even){
        background-color: #1f1f1f;
    }

    tr:hover{
        background-color: #ff6a00;
        color: black;
        transform: scale(1.02);
    }

    h1{
        text-align: center;
        margin-top: 40px;
        color: #ff914d;
        text-shadow: 0 0 10px rgba(255, 115, 0, 0.6);
    }
</style>
</head>
<body>

</a>

<h1 style="text-align:center;">Películas Famosas</h1>

<table>
    <thead>
        <tr>
            <th>Película</th>
            <th>Año de estreno</th>
            <th>Director</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Titanic</td>
            <td>1997</td>

        </tr>
        <tr>

        </tr>

        </tr>
        <tr>

        </tr>
    </tbody>
</table>
