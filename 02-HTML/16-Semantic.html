<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>tabla semántica</title>
    <link rel="stylesheet" href="../src/css/02 -html.css">
</head>

<body>

<main>
    <header>
        <h1>16-semantic</h1>
        <h2>Defines layout with semantic tags (new style).</h2>
    </header>

    <section>

<style>
    body{
        background-color: #000000;
        font-family: Arial, sans-serif;
        color: white;
    }

    /* 🔥 SOLO ESTE CUADRO MEJORADO */
    .layout{
        width: 500px;
        margin: 60px auto;
        border: 4px solid #cfcfcf;
        padding: 15px;
        border-radius: 6px;
    }

    .box{
        border: 3px solid #cfcfcf;
        background-color: #cc6600a9;
        text-align: center;
        padding: 18px;
        margin: 8px 0;
        font-weight: bold;
    }

    .flex{
        display: flex;
        gap: 10px;
    }

    .article{
        width: 65%;
    }

    .aside{
        width: 35%;
    }

    .section{
        background-color: #391c0bac;
        margin-top: 12px;
        padding: 15px;
        border: 2px solid #cfcfcf;
        font-size: 14px;
    }

    /* botón volver (igual que antes) */
    .btn-home {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgba(0, 0, 0, 0.6);
        border: 1px solid #E44D26;
    }
</style>

<a href="../02-HTML/Index.html" class="btn-home">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 256 256">
        <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
    </svg>
</a>

<div class="layout">

    <header class="box">
        &lt;header&gt;
    </header>

    <nav class="box">
        &lt;nav&gt;
    </nav>

    <main class="flex">

        <article class="box article">
            &lt;article&gt;

            <section class="section">
                &lt;section&gt;
            </section>

        </article>

        <aside class="box aside">
            &lt;aside&gt;
        </aside>

    </main>

    <footer class="box">
        &lt;footer&gt;
    </footer>

</div>


    </section>
</main>

</body>
</html>
