<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13-box-model</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        body{
            display: flex;
            flex-direction: column;
        }

        section{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div.box{
            /* ANCHO Y ALTO */
            width: 300px;
            height: 300px;

            /* COLOR */
            background-color: #7c3aed;
            color: white;

            /* TEXTO */
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            line-height: 220px;

            /* MARGEN */
            margin: 40px;

            /* RELLENO */
            padding: 30px;

            /* BORDE */
            border: 10px solid white;

            /* SOMBRA */
            box-shadow: 0 0 20px #00000088;

            /* MODELO DE CAJA */
            box-sizing: border-box;

            border-radius: 20px;
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31
                l58.35,58.34a8,8,0,0,1-11.32,11.32
                l-72-72a8,8,0,0,1,0-11.32l72-72
                a8,8,0,0,1,11.32,11.32L59.31,120H216
                A8,8,0,0,1,224,128Z">
            </path>

        </svg>
    </a>

    <main>

        <header>

            <h1>13-box-model</h1>

            <h2>
                Is essentially a box that wraps around every HTML element.
            </h2>

        </header>

        <section>

            <div class="box">
                BOX 📦
            </div>

        </section>

    </main>

</body>
</html>
