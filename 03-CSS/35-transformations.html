<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>35-transformations</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        section div {
            width: 320px;
            height: 200px;
            margin: 2rem auto;

            background: url("../src/imgs/tulipanes.jpg") center/cover;

            border: 4px solid #000d;
            border-radius: 10px;

            transition: all .8s ease;
            cursor: pointer;
        }

        /* Rotate */

        div.rotate:hover {
            transform: rotate(20deg);
        }

        /* Scale */

        div.scale:hover {
            transform: scale(1.2);
        }

        /* Translate */

        div.translate:hover {
            transform: translateX(50px);
        }

        /* Skew */

        div.skew:hover {
            transform: skew(20deg);
        }

        /* Multiple Transformations */

        div.multiple:hover {
            transform:
                rotate(15deg)
                scale(1.15)
                translateY(-20px);
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg"
             width="32"
             height="32"
             fill="white"
             viewBox="0 0 256 256">
            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
        </svg>
    </a>

    <main>

        <header>
            <h1>35 Transformations</h1>
            <h2>Property lets you rotate, scale, skew, or translate an element</h2>
        </header>

        <section>

            <h3>Rotate</h3>
            <div class="rotate"></div>

            <h3>Scale</h3>
            <div class="scale"></div>

            <h3>Translate</h3>
            <div class="translate"></div>

            <h3>Skew</h3>
            <div class="skew"></div>

            <h3>Multiple Transformations</h3>
            <div class="multiple"></div>

        </section>

    </main>

</body>

</html>
