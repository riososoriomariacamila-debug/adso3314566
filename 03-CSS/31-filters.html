<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>31-filters</title>
    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        section img {
    display: block;
    margin: 1rem auto;
    width: 320px;
    border: 4px solid #000d;
    border-radius: 10px;
    transition: all 0.5s ease;
    cursor: pointer;
}

section img:hover {
    filter: none;
    transform: scale(1.05);
}

        /* Blur */
        img.blur {
            filter: blur(4px);
        }


        /* Brightness */
        img.brightness {
            filter: brightness(1.5);
        }

        /* Contrast */
        img.contrast {
            filter: contrast(200%);
        }

        /* Grayscale */
        img.grayscale {
            filter: grayscale(100%);
        }

        /* Sepia */
        img.sepia {
            filter: sepia(100%);
        }

        /* Saturate */
        img.saturate {
            filter: saturate(300%);
        }

        /* Hue Rotate */
        img.hue {
            filter: hue-rotate(180deg);
        }

        /* Multiple Filters */
        img.multiple {
            filter:
                grayscale(50%)
                contrast(150%)
                brightness(1.2);
        }
        
        
    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>

        <header>
            <h1>31 Filters</h1>
            <h2>Defines visual effects (like blur and saturation)</h2>
        </header>

        <section>

            <h3>Blur</h3>
            <img src="../src/imgs/tulipanes.jpg" class="blur">

            <h3>Brightness</h3>
            <img src="../src/imgs/tulipanes.jpg" class="brightness">

            <h3>Contrast</h3>
            <img src="../src/imgs/tulipanes.jpg" class="contrast">

            <h3>Grayscale</h3>
            <img src="../src/imgs/tulipanes.jpg" class="grayscale">

            <h3>Sepia</h3>
            <img src="../src/imgs/tulipanes.jpg" class="sepia">

            <h3>Saturate</h3>
            <img src="../src/imgs/tulipanes.jpg" class="saturate">

            <h3>Hue Rotate</h3>
            <img src="../src/imgs/tulipanes.jpg" class="hue">

            <h3>Multiple Filters</h3>
            <img src="../src/imgs/tulipanes.jpg" class="multiple">

        </section>

    </main>

</body>

</html>
