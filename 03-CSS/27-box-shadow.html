<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>27-box shadow</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
  <style>
    /* ===== ESTILOS GENERALES DE LA PÁGINA ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      text-align: center;
      background-color: #9B3BFF;
      background-attachment: fixed;
      background-size: cover;
      font-family: "Bricolage Grotesque", sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 1rem;
    }

    main {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    header h1 {
      font-size: 2rem;
      margin: 0;
    }

    header h2 {
      font-size: 1rem;
      color: #fff9;
    }

    section {
      background-color: #663399a2;
      border-radius: 0.2rem;
      width: 100%;
      max-width: 500px;
      margin: 2rem auto;
      padding: 1rem;
    }

    section h3 {
      border-bottom: 2px dotted #fff;
      margin: 0 0 1rem 0;
      padding-bottom: 0.5rem;
    }

    /* ===== ESTILOS DEL BOTÓN HOME - MÁS GRANDE ===== */
    a.btn-home {
      border: 2px solid rgb(255, 253, 253);
      border-radius: 50%;
      position: fixed;
      display: flex;
      width: 48px;
      height: 48px;
      background-color: #663399;
      padding: 0.5rem;
      top: 1rem;
      left: 1rem;
      transition: all 0.2s ease-in;
      text-decoration: none;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    a.btn-home:hover {
      transform: scale(1.1);
      opacity: 1;
      background-color: #8a4bcb;
    }

    a.btn-home svg {
      width: 28px;
      height: 28px;
    }

    /* ESTILOS DE LAS CAJAS */
    .box {
      width: 200px;
      height: 200px;
      background: #b341ff;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      margin: 20px auto;
      transition: all 0.4s ease-out;
      cursor: pointer;
    }

    .box1 {
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }
    .box2 {
      box-shadow: -6px -6px 12px 0 rgba(255,255,255,0.4);
    }
    .box3 {
      box-shadow: 0 0 12px rgba(255,255,255,0.3) inset;
    }
    .box4 {
      box-shadow: 3px 3px 0 3px rgba(204,204,0,0.6), 6px 6px 0 5px rgba(0,0,204,0.5), 9px 9px 0 6px rgba(204,0,0,0.4);
    }

    /* IMÁGENES - UNA DEBAJO DE LA OTRA */
    .images {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      margin: 2rem 0;
    }

    .images img {
      width: 100%;
      max-width: 350px;
      border: 10px solid rgb(250, 250, 250);
      border-radius: 10%;
      transition: all 0.4s ease-out;
    }

    .images img:first-child {
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    .images img:last-child {
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
    }

    /* ===== ANIMACIONES MÁS SOBRIAS Y PASIVAS ===== */
    
    .box1:hover {
      box-shadow: 0 0 16px rgba(255,255,255,0.7), 0 0 24px rgba(255,255,255,0.3);
      transform: scale(1.03);
    }
    
    .box2:hover {
      box-shadow: -10px -10px 20px 0 rgba(0,255,255,0.4), -4px -4px 12px 0 rgba(0,255,255,0.2);
      transform: scale(1.03) rotate(-1deg);
      background: linear-gradient(135deg, #b341ff, #9b30ff);
    }
    
    .box3:hover {
      box-shadow: 0 0 16px rgba(255,68,255,0.4) inset, 0 0 20px rgba(255,68,255,0.2);
      transform: scale(1.03);
      background: linear-gradient(135deg, #b341ff, #c050ff);
    }
    
    .box4:hover {
      box-shadow: 5px 5px 0 4px rgba(204,204,0,0.7), 10px 10px 0 6px rgba(0,0,204,0.6), 15px 15px 0 8px rgba(204,0,0,0.5);
      transform: translateY(-3px);
    }
    
    .images img:first-child:hover {
      box-shadow: 0 0 16px rgba(255,0,255,0.4), 0 0 24px rgba(255,0,255,0.2);
      transform: scale(1.02);
    }
    
    .images img:last-child:hover {
      filter: drop-shadow(0 0 12px rgba(0,255,136,0.4)) drop-shadow(0 0 20px rgba(0,255,136,0.2));
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <a href="../03-css/index.html" class="btn-home">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
      <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
    </svg>
  </a>

  <main>
    <header>
      <h1>27 box shadow</h1>
      <h2>Property attaches one or more shadows to an element.</h2>
    </header>

    <section>
      <h3>box-shadow: 0 0 12px #fff</h3>
      <div class="box box1"></div>
    </section>

    <section>
      <h3>box-shadow: -10px -10px 24px 0 #fff</h3>
      <div class="box box2"></div>
    </section>

    <section>
      <h3>box-shadow: 0 0 20px #fff inset</h3>
      <div class="box box3"></div>
    </section>

    <section>
      <h3>box-shadow: multiple</h3>
      <div class="box box4"></div>
    </section>

    <section>
      <h3>box-shadow VS drop-shadow()</h3>
      <div class="images">
        <img src="../src/imgs/twd.jpg" alt="box-shadow effect">
        <img src="../src/imgs/twd.jpg" alt="drop-shadow effect">
      </div>
    </section>
  </main>
</body>
</html>
