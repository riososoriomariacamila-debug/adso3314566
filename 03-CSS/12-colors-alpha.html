<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12_colors_alpha</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
<style>
    body{
        display: flex;
        flex-direction: column;
    }

    figure.mariposa {
        background-image: url(../03-CSS/img/mariposaciber.png);
        background-repeat: no-repeat;

        /* CENTRAR LA IMAGEN */
        background-position: center;

        /* AJUSTAR TAMAÑO */
        background-size: contain;

        border: 4px solid white;
        margin: 4rem auto;

        height: 450px;
        width: 450px;

        overflow: hidden;
    }

    figure.mariposa div{
        height: calc(450px / 3);
    }

    figure.mariposa .box1{
        background-color: rgba(255, 255, 255, 0.8);
    }

    figure.mariposa .box2{
        background-color: #ffffff77;
    }

    figure.mariposa .box3{
        background-color: hsla(0, 0%, 100%, 0.267);
    }
</style>

</head>
<body>
    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> 
    </a>
    <main>
        <header>
            <h1>12-colors-alpha</h1>
            <h2>The fourth alpha channel allows you to apply opacity or transparency to the color.</h2>
        </main>
        </header>
            <section>
                <h3>example transparent color</h3>

                <figure class="mariposa">
                    <div class="box1"></div>
                    <div class="box2"></div>
                    <div class="box3"></div>
                </figure>
            </section>
    </main>
</body>
</html>
