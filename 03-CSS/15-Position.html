<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-positions</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        main{
            width: 600px;
        }

        header{
            text-align: center;
            color: white;
        }

        header h1{
            font-size: 3rem;
        }

        header h2{
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        section{
            background-color: #2b1838c7;

            border-radius: 10px;

            padding: 15px;

            margin-bottom: 25px;
        }

        section h3{
            color: white;

            border-bottom: 2px dotted white;

            padding-bottom: 5px;

            margin-bottom: 15px;
        }

        .container{
            width: 100%;
            height: 220px;

            border: 5px solid white;

            background-color: #2c2430;

            position: relative;
        }

        .box{
            width: 100px;
            height: 100px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-weight: bold;
        }

        /* STATIC */

        .static .box{
            background-color: crimson;
            position: static;
            margin: 20px;
        }

        /* RELATIVE */

        .relative .box{
            background-color: royalblue;

            position: relative;

            top: 20px;
            left: 40px;
        }

        /* ABSOLUTE */

        .absolute .static-box{
            background-color: crimson;
            margin: 20px;
        }

        .absolute .absolute-box{
            background-color: darkorange;

            position: absolute;

            top: 20px;
            right: 20px;
        }

        /* STICKY */

        .sticky{
            height: 500px;
        }

        .sticky .container{
            height: 400px;

        }

        .sticky .box{
            background-color: darkmagenta;

            position: sticky;

            top: 20px;
            left: 20px;

            margin: 20px;
        }

        .sticky p{
            color: white;
            padding: 10px 20px;
        }

        /* FIXED */

        .fixed-box{
            width: 100px;
            height: 100px;

            border-radius: 50%;

            background-color: green;

            color: white;
            font-weight: bold;

            display: flex;
            justify-content: center;
            align-items: center;

            position: fixed;

            right: 30px;
            bottom: 30px;
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31
                l58.35,58.34a8,8,0,0,1-11.32,11.32
                l-72-72a8,8,0,0,1,0-11.32l72-72
                a8,8,0,0,1,11.32,11.32L59.31,120H216
                A8,8,0,0,1,224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>

            <h1>15-positions</h1>

            <h2>
                CSS position property specifies how an element is positioned.
            </h2>

        </header>

            <section class="sticky">

            <h3>Sticky:</h3>

            <div class="container">

                <div class="box">
                    STICKY
                </div>

                <p>Lorem ipsum dolor sit amet.</p>

            </div>

        </section>

        <section class="static">

            <h3>Normal / Static:</h3>

            <div class="container">

                <div class="box">
                    STATIC
                </div>

            </div>

        </section>

        <section class="relative">

            <h3>Relative:</h3>

            <div class="container">

                <div class="box">
                    RELATIVE
                </div>

            </div>

        </section>

        <section class="absolute">

            <h3>Absolute:</h3>

            <div class="container">

                <div class="box static-box">
                    STATIC
                </div>

                <div class="box absolute-box">
                    ABSOLUTE
                </div>

            </div>

        </section>

        <section>

            <h3>Fixed:</h3>

            <div class="container"></div>

        </section>

    </main>

    <div class="fixed-box">
        FIXED
    </div>

</body>
</html>
