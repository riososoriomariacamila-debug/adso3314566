<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>33-web-fonts</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Oswald:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

    <style>

        section h3 {
            text-align: center;
            margin-top: 2rem;
        }

        section p {
            text-align: center;
            font-size: 2rem;
            margin: 1rem auto 2rem auto;
        }

        /* Pacifico */

        .font1 {
            font-family: 'Pacifico', cursive;
        }

        /* Oswald */

        .font2 {
            font-family: 'Oswald', sans-serif;
        }

        /* Playfair */

        .font3 {
            font-family: 'Playfair Display', serif;
        }
        
        .font4{
    font-family: 'Bungee', cursive;
}
        /* Hover divertido */

        section p {
            transition: all .4s ease;
            cursor: pointer;
        }

        section p:hover {
            transform: scale(1.1);
            letter-spacing: 3px;
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg"
             width="32"
             height="32"
             fill="white"
             viewBox="0 0 256 256">
            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
        </svg>
    </a>

    <main>

        <header>
            <h1>33 Web Fonts</h1>
            <h2>Use fonts that are not installed on the user's computer</h2>
        </header>

        <section>

            <h3>Pacifico</h3>
            <p class="font1">
                ADSO - Learning CSS
            </p>

            <h3>Oswald</h3>
            <p class="font2">
                ADSO - Learning CSS
            </p>

            <h3>Playfair Display</h3>
            <p class="font3">
                ADSO - Learning CSS
            </p>
            
            <h3>Bungee</h3>
<p class="font4">
    ADSO - Learning CSS
</p>

        </section>

    </main>

</body>

</html>
