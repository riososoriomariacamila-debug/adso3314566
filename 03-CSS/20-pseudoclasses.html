<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20-pseudoclasses</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        body{
            display: flex;
            flex-direction: column;
        }

        main{
            width: 900px;
            margin: 0 auto;
        }

        section{
            background-color: #2b1838c7;

            border-radius: 10px;

            padding: 20px;

            margin-bottom: 30px;
        }

        section h3{
            color: white;

            border-bottom: 2px dotted white;

            padding-bottom: 5px;

            margin-bottom: 20px;
        }

        .container{
            border: 5px solid white;

            background-color: #2c2430;

            padding: 25px;

            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* ========================= */
        /* HOVER */
        /* ========================= */

        .hover-btn{
            background-color: royalblue;

            color: white;

            border: none;

            padding: 15px 25px;

            border-radius: 10px;

            cursor: pointer;

            transition: 0.3s;
        }

        .hover-btn:hover{
            background-color: cyan;

            color: black;

            transform: scale(1.1);
        }

        /* ========================= */
        /* ACTIVE */
        /* ========================= */

        .active-btn{
            background-color: crimson;

            color: white;

            border: none;

            padding: 15px 25px;

            border-radius: 10px;

            cursor: pointer;
        }

        .active-btn:active{
            background-color: orange;

            transform: scale(0.95);
        }

        /* ========================= */
        /* FOCUS */
        /* ========================= */

        .focus-input{
            padding: 12px;

            border-radius: 10px;

            border: 3px solid gray;

            outline: none;
        }

        .focus-input:focus{
            border-color: cyan;

            box-shadow: 0 0 10px cyan;
        }

        /* ========================= */
        /* FIRST-CHILD */
        /* ========================= */

        .list li{
            color: white;

            margin-bottom: 10px;
        }

        .list li:first-child{
            color: gold;

            font-weight: bold;
        }

        /* ========================= */
        /* LAST-CHILD */
        /* ========================= */

        .list li:last-child{
            color: cyan;

            font-style: italic;
        }

        /* ========================= */
        /* NTH-CHILD */
        /* ========================= */

        .cards{
            display: flex;

            gap: 15px;
        }

        .card{
            width: 100px;
            height: 100px;

            background-color: gray;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-weight: bold;

            border-radius: 10px;
        }

        .card:nth-child(2){
            background-color: darkorange;
        }

        .card:nth-child(4){
            background-color: mediumseagreen;
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31
                l58.35,58.34a8,8,0,0,1-11.32,11.32
                l-72-72a8,8,0,0,1,0-11.32l72-72
                a8,8,0,0,1,11.32,11.32L59.31,120H216
                A8,8,0,0,1,224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>

            <h1>20-pseudoclasses</h1>

            <h2>
                Pseudoclasses define a special state of an element.
            </h2>

        </header>

        <!-- HOVER -->

        <section>

            <h3>:hover</h3>

            <div class="container">

                <button class="hover-btn">
                    Hover Me
                </button>

            </div>

        </section>

        <!-- ACTIVE -->

        <section>

            <h3>:active</h3>

            <div class="container">

                <button class="active-btn">
                    Click Me
                </button>

            </div>

        </section>

        <!-- FOCUS -->

        <section>

            <h3>:focus</h3>

            <div class="container">

                <input
                    type="text"
                    class="focus-input"
                    placeholder="Click here">

            </div>

        </section>

        <!-- FIRST & LAST CHILD -->

        <section>

            <h3>:first-child & :last-child</h3>

            <div class="container">

                <ul class="list">

                    <li>First item</li>
                    <li>Second item</li>
                    <li>Third item</li>
                    <li>Last item</li>

                </ul>

            </div>

        </section>

        <!-- NTH-CHILD -->

        <section>

            <h3>:nth-child()</h3>

            <div class="container">

                <div class="cards">

                    <div class="card">1</div>
                    <div class="card">2</div>
                    <div class="card">3</div>
                    <div class="card">4</div>

                </div>

            </div>

        </section>

    </main>

</body>
</html>
