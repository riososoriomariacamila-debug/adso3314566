<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>34-variables</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        :root {
            --primary-color: #5c3d99;
            --secondary-color: #8e7cc3;
            --bg-color: #f4f0ff;
            --text-color: #333;
            --radius: 15px;
        }

        section div {
            width: 320px;
            margin: 1rem auto;
            padding: 1rem;

            background-color: var(--bg-color);

            border: 4px solid var(--primary-color);
            border-radius: var(--radius);

            text-align: center;

            transition: all .4s ease;
        }

        section div:hover {
            background-color: var(--secondary-color);
            transform: scale(1.05);
        }

        section h4 {
            color: var(--primary-color);
            margin: 0;
        }

        section p {
            color: var(--text-color);
        }

        /* Ejemplo 2 */

        .card2 {
            --primary-color: #009688;

            border-color: var(--primary-color);
        }

        .card2 h4 {
            color: var(--primary-color);
        }

        /* Ejemplo 3 */

        .card3 {
            --primary-color: #ff5722;

            border-color: var(--primary-color);
        }

        .card3 h4 {
            color: var(--primary-color);
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg"
             width="32"
             height="32"
             fill="white"
             viewBox="0 0 256 256">
            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>

        <header>
            <h1>34 Variables</h1>
            <h2>The var() function is used to insert the value of a CSS variable</h2>
        </header>

        <section>

            <h3>Global Variables</h3>

            <div class="card1">
                <h4>Primary Color</h4>
                <p>Using var(--primary-color)</p>
            </div>

            <h3>Local Variables</h3>

            <div class="card2">
                <h4>Green Theme</h4>
                <p>Local CSS Variable</p>
            </div>

            <div class="card3">
                <h4>Orange Theme</h4>
                <p>Local CSS Variable</p>
            </div>

        </section>

    </main>

</body>

</html>
