<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 Percentage Units</title>
    <link rel="stylesheet" href="../src/css/03-CSS.css">
    <style>
        main {
            width: 100%;
            section.percentage {
                margin: 0 auto;
                width: 80%;
                div.parent {
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    div {
                        display: flex;
                        justify-content: center;
                        font-size: 2.4rem;
                        align-items: center;
                        height: 50dvh;
                        &.child1 {
                            background-color: rgb(150, 86, 150);
                            width: 70%;
                        }
                        &.child2 {
                            background-color: rgb(102, 153, 214);
                            width: 30%;
                        }
                    }
                }
            }
        }
    </style>
</head>
<body>
        <a href="../03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg> 
    </a>
    <main>
        <header>
            <h1>10 Percentage Units</h1>
            <h2>Are relative to the size of the parent element.</h2>
        </header>
        <section class="percentage">
            <div class="parent">
                <div class="child1">70%</div>
                <div class="child2">30%</div>
            </div>
        </section>
    </main>
</body>
</html>
