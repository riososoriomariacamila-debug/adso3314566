<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>22-cursors</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

        body{
            display: flex;
            flex-direction: column;
        }

        main{
            width: 900px;
            margin: 0 auto;
        }

        section{
            background-color: #2b1838c7;

            border-radius: 10px;

            padding: 20px;

            margin-bottom: 30px;
        }

        section h3{
            color: white;

            border-bottom: 2px dotted white;

            padding-bottom: 5px;

            margin-bottom: 20px;
        }

        .container{
            border: 5px solid white;

            background-color: #2c2430;

            padding: 25px;

            display: flex;
            flex-wrap: wrap;

            gap: 20px;
        }

        .cursor-box{
            width: 180px;
            height: 100px;

            border-radius: 12px;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
            font-weight: bold;

            transition: 0.3s;
        }

        .cursor-box:hover{
            transform: scale(1.05);
        }

        /* ========================= */
        /* CURSORS */
        /* ========================= */

        .pointer{
            background-color: royalblue;

            cursor: pointer;
        }

        .wait{
            background-color: darkorange;

            cursor: wait;
        }

        .crosshair{
            background-color: crimson;

            cursor: crosshair;
        }

        .move{
            background-color: mediumseagreen;

            cursor: move;
        }

        .help{
            background-color: darkviolet;

            cursor: help;
        }

        .not-allowed{
            background-color: gray;

            cursor: not-allowed;
        }

        .grab{
            background-color: teal;

            cursor: grab;
        }

        .zoom{
            background-color: deeppink;

            cursor: zoom-in;
        }

    </style>

</head>

<body>

    <a href="../03-css/index.html" class="btn-home">

        <svg xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            fill="white"
            viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31
                l58.35,58.34a8,8,0,0,1-11.32,11.32
                l-72-72a8,8,0,0,1,0-11.32l72-72
                a8,8,0,0,1,11.32,11.32L59.31,120H216
                A8,8,0,0,1,224,128Z">
            </path>

        </svg>

    </a>

    <main>

        <header>

            <h1>22-cursors</h1>

            <h2>
                CSS cursors define the mouse pointer style over elements.
            </h2>

        </header>

        <section>

            <h3>Cursor Types</h3>

            <div class="container">

                <div class="cursor-box pointer">
                    pointer
                </div>

                <div class="cursor-box wait">
                    wait
                </div>

                <div class="cursor-box crosshair">
                    crosshair
                </div>

                <div class="cursor-box move">
                    move
                </div>

                <div class="cursor-box help">
                    help
                </div>

                <div class="cursor-box not-allowed">
                    not-allowed
                </div>

                <div class="cursor-box grab">
                    grab
                </div>

                <div class="cursor-box zoom">
                    zoom-in
                </div>

            </div>

        </section>

    </main>

</body>
</html>
